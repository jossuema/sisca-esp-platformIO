; PlatformIO Project Configuration File
; Migración de sisca-esp (ESP-IDF) al framework Arduino.
;
; Transporte: Bluetooth Low Energy (BLE / GATT) vía NimBLE, para hablar con el
; módulo BluetoothUtilsBLE del móvil (GATT central, servicio FFE0 / char FFE1).
; A diferencia del antiguo SPP (Bluetooth Classic), BLE funciona también en
; variantes ESP32-S3/C3; aquí mantenemos esp32dev por compatibilidad.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; WiFi + BLE + TLS (mbedTLS) generan un binario grande:
; usamos un esquema de particiones con app de 3 MB y sin OTA.
board_build.partitions = huge_app.csv

lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    h2zero/NimBLE-Arduino@^1.4.2

build_flags =
    -DCORE_DEBUG_LEVEL=3
