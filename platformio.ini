; PlatformIO Project Configuration File
; Migración de sisca-esp (ESP-IDF) al framework Arduino.
;
; ESP32 clásico: requerido por Bluetooth Classic (SPP). Las variantes
; S2/S3/C3 NO tienen Bluetooth Classic, así que no sirven para SerialBT.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; WiFi + Bluetooth Classic + TLS (mbedTLS) generan un binario grande:
; usamos un esquema de particiones con app de 3 MB y sin OTA.
board_build.partitions = huge_app.csv

lib_deps =
    bblanchon/ArduinoJson@^7.4.2

build_flags =
    -DCORE_DEBUG_LEVEL=3
